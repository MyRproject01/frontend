<audio autoplay loop id="bg-music">
  <source src="/soundtrack.mp3" type="audio/mpeg" />
</audio>

@if (showVideo()) {
<video autoplay loop [muted]="true" playsinline class="video-background">
    <source src="/background.mp4" type="video/mp4" />
</video>
<div class="scanlines"></div>
}

<!-- Global TopAppBar -->
@if (showTopbar()) {
<header class="top-app-bar">
    <div class="header-left">
        <div class="user-avatar-container">
            <img alt="User Profile" class="user-avatar"
                data-alt="cybernetic user portrait"
                src="/chico-te.png" />
            <div class="avatar-overlay"></div>
        </div>
        <div class="user-info">
            <div class="user-name">{{ username() | uppercase }} <span class="badge">PRO</span></div>
            <div class="user-status">
                <span class="status-dot"></span> CONNECTION STABLE
            </div>
            <div class="xp-bar-container">
                <div class="xp-bar" style="width: 75%"></div>
            </div>
        </div>
    </div>
    <div class="header-center hidden-mobile">
        <div class="system-alerts">
            <span class="material-symbols-outlined icon-alert">sensors</span>
            <span class="alert-text">SECTOR 7G SECURED</span>
        </div>
        <div class="decorative-waves">
            <div class="wave w1"></div>
            <div class="wave w2"></div>
            <div class="wave w3"></div>
            <div class="wave w4"></div>
            <div class="wave w5"></div>
        </div>
    </div>
    <div class="header-right">
    </div>
</header>
}

<router-outlet />
