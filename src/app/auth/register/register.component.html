<div class="register-container">
  <!-- CRT Scanline Overlay -->
  <div class="scanlines-overlay"></div>

  <!-- Subtle Vignette -->
  <div class="vignette-overlay"></div>

  <main class="main-content">
    <!-- Header Section -->
    <header class="header-section">
      <div class="header-title-container">
        <span class="material-symbols-outlined terminal-icon">terminal</span>
        <h1 class="system-enrollment-title">System Enrollment</h1>
      </div>
      <p class="header-subtitle">Awaiting Operator Designation...</p>
    </header>

    <!-- Main Form Panel -->
    <form class="main-form-panel hull-plate" [formGroup]="registerForm" (ngSubmit)="onSubmit($event)">
      <!-- Corner Accents -->
      <div class="corner-accent-tr"></div>
      <div class="corner-accent-bl"></div>

      @if (errorMessage) {
      <div class="error-message-panel"
        style="color: #ff3366; text-align: center; margin-bottom: 1rem; font-family: monospace; border: 1px solid #ff3366; padding: 0.5rem; background: rgba(255, 51, 102, 0.1);">
        > ERROR: {{ errorMessage }}
      </div>
      }

      <div class="form-fields">
        <!-- Field: Alias -->
        <div class="input-group">
          <label class="input-label" for="alias">
            <span>Nickname</span>
          </label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined input-icon">badge</span>
            <input class="form-input" id="alias" name="alias" formControlName="alias" placeholder="e.g. BestPlayer"
              type="text" autocomplete="off" />
          </div>
        </div>

        <!-- Field: Comms Channel (Email) -->
        <div class="input-group">
          <label class="input-label" for="email">
            <span>Email</span>
            <span class="req-indicator">[REQ]</span>
          </label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined input-icon">settings_input_antenna</span>
            <input class="form-input" id="email" name="email" formControlName="email" placeholder="xxx@xx.com"
              type="email" autocomplete="off" />
          </div>
        </div>

        <!-- Field: Encryption -->
        <div class="input-group">
          <label class="input-label" for="password">
            <span>Password</span>
            <span class="req-indicator">[REQ]</span>
          </label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined input-icon">lock</span>
            <input class="form-input" id="encryption" name="encryption" formControlName="password"
              placeholder="••••••••••••" type="password" autocomplete="off" />
          </div>
        </div>
      </div>

      <!-- Safety Notice Panel -->
      <!-- <div class="safety-notice-panel">
        <div class="glitch-bg"></div>
        <span class="material-symbols-outlined warning-icon">warning</span>
        <div class="safety-text-container">
          <h3 class="safety-title">Critical Safety Warning</h3>
          <p class="safety-description">
            Direct neural interfacing during uncalibrated enrollment carries a 14.3% risk of minor synaptic
            fragmentation. Ensure cerebral shunts are engaged prior to initialization.
          </p>
        </div>
      </div> -->

      <!-- Submit Action -->
      <button class="submit-action btn-tactical" type="submit" [disabled]="isLoading() || registerForm.invalid">
        <span>{{ isLoading() ? 'INITIALIZING...' : 'Register' }}</span>
        <span class="material-symbols-outlined arrow-icon">{{ isLoading() ? 'sync' : 'arrow_forward' }}</span>
      </button>

      <div class="auth-links"
        style="margin-top: 1.5rem; text-align: center; font-family: monospace; font-size: 0.9rem;">
        <span style="color: rgba(255, 255, 255, 0.6);">ALREADY ENROLLED?</span>
        <a routerLink="/login"
          style="color: #00f3ff; text-decoration: none; margin-left: 0.5rem; text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);">>
          LOGIN</a>
      </div>
    </form>

    <!-- Footer status -->
    <div class="footer-status">
      <span>v.0.7.2_b</span>
      <span class="online-status">
        <span class="status-dot"></span> Online
      </span>
    </div>
  </main>
</div>
