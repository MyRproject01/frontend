<div class="login-container">
  <div class="scanlines-overlay"></div>
  <div class="bg-noise"></div>

  <div class="auth-panel">
    <div class="circuit-border top-left-border"></div>
    <div class="circuit-border top-right-border"></div>
    <div class="circuit-border bottom-left-border"></div>
    <div class="circuit-border bottom-right-border"></div>

    <div class="panel-content">
      <div class="panel-header">
        <span class="material-symbols-outlined terminal-icon">terminal</span>
        <h1 class="system-title">ECHO</h1>

      </div>

      @if (errorMessage) {
      <div class="error-message-panel"
        style="color: #ff3366; text-align: center; margin-bottom: 1rem; font-family: monospace; border: 1px solid #ff3366; padding: 0.5rem; background: rgba(255, 51, 102, 0.1);">
        > ERROR: {{ errorMessage }}
      </div>
      }

      <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="onSubmit($event)">
        <div class="input-group">
          <label class="input-label">
            <span>NickName</span>
          </label>
          <div class="input-wrapper">
            <span class="input-prefix">&gt;</span>
            <input type="text" formControlName="username" placeholder="ENTER_IDENTITY..." autocomplete="off"
              spellcheck="false" class="auth-input" />
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">
            <span>Password</span>
          </label>
          <div class="input-wrapper">
            <span class="input-prefix">&gt;</span>
            <input type="password" formControlName="password" placeholder="••••••••••••" autocomplete="off"
              class="auth-input password-input" />
          </div>
        </div>

        <button type="submit" class="action-button clip-button" [disabled]="isLoading() || loginForm.invalid">
          <div class="button-content">
            <span class="material-symbols-outlined login-icon">{{ isLoading() ? 'sync' : 'login' }}</span>
            <span>{{ isLoading() ? 'AUTHENTICATING...' : 'LOGIN' }}</span>
          </div>
          <div class="glitch-overlay"></div>
        </button>

        <div class="auth-links"
          style="margin-top: 1.5rem; text-align: center; font-family: monospace; font-size: 0.9rem;">
          <span style="color: rgba(255, 255, 255, 0.6);">NOT ENROLLED?</span>
          <a routerLink="/register"
            style="color: #00f3ff; text-decoration: none; margin-left: 0.5rem; text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);">>
            REGISTER</a>
        </div>
      </form>
    </div>
  </div>
</div>
