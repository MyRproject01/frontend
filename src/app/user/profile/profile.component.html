<div class="profile-container">
  <div class="scanline-overlay"></div>

  <!-- Back Button -->
  <button class="back-btn" routerLink="/main">
    <span class="material-symbols-outlined">arrow_back_ios</span>
    BACK TO MAIN MENU
  </button>

  <!-- Centered Profile Card -->
  <div class="profile-card">

    <!-- Corner accents -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- Top: Identity -->
    <div class="identity-row">
      <div class="avatar-block">
        <div class="avatar-frame">
          <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuD1VQcjFTYZ3S9ejv4tFMbp9ZESgXhsN_MjzJptzZ8BEQPrra4V41QXnlw_NtNuXuRu6cZBeBV4huK2JGmZ3XvFn3-EF11hS76eu_OiLUKnNV1DmPD4zzMaK7z5BAsrb1UT5Pd4pZ5OSPY6F3Rfag4kuIMWDkKH51JQCwc09TRZqwNPWqZ1Zdv-JtFgCPH85w95t_a5CXFa9VvHZte_3MHBNJkCS_3-422SH-whraykPmaKLurG_UjAQ_iwRp6DHg3w67rvihrEwPkh" alt="{{ username() }}" />
        </div>
      </div>

      <div class="identity-info">
        <h1 class="operator-name">{{ username() | uppercase }}</h1>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-cell">
        <span class="material-symbols-outlined stat-icon">emoji_events</span>
        <span class="stat-val">{{ highScore | number }}</span>
        <span class="stat-lbl">HIGH SCORE</span>
      </div>
      <div class="stat-cell">
        <span class="material-symbols-outlined stat-icon">waves</span>
        <span class="stat-val">W{{ maxWave }}</span>
        <span class="stat-lbl">BEST WAVE</span>
      </div>
    </div>

  </div>
</div>
