<div class="scanline-overlay"></div>





<!-- Back Button -->
<button class="back-btn" routerLink="/main">
  <span class="material-symbols-outlined">arrow_back_ios</span>
  BACK TO MENU
</button>

<!-- Main Content -->
<main class="app-main">
  <!-- Left Section: Character Preview -->
  <section class="main-left preview-panel" routerLink="/loadout/characters" [queryParams]="{from: 'build'}" style="cursor: pointer;">
    <!-- Corner accents -->
    <div class="preview-corner corner-tl"></div>
    <div class="preview-corner corner-br"></div>

    <!-- Character Image -->
    <div class="preview-image" [style.background-image]="selectedCharacter() ? 'url(' + getImageUrl(selectedCharacter()!.name) + ')' : 'none'"></div>

    <!-- Grid overlay -->
    <div class="preview-grid-overlay"></div>

    <!-- Reticle decoration -->
    <div class="reticle">
      <div class="reticle-tick rt-top"></div>
      <div class="reticle-tick rt-bottom"></div>
      <div class="reticle-tick rt-left"></div>
      <div class="reticle-tick rt-right"></div>
      <div class="reticle-inner"></div>
    </div>

    <!-- Character Name Block (Matching Characters Tab) -->
    <div class="preview-name-block" *ngIf="selectedCharacter()">
      <h1 class="preview-title">{{ selectedCharacter()!.name | uppercase }}</h1>
    </div>
  </section>

  <!-- Right Section: Menu & Config -->
  <section class="main-right">
    <div class="config-scroll-area custom-scrollbar">
      <!-- 1. Selected Weapons -->
      <div class="config-section">
        <div class="section-header">
          <span class="material-symbols-outlined" data-icon="swords">swords</span>
          <h3>Selected Weapons</h3>
        </div>
        <div class="weapon-grid">
          @for (weapon of selectedWeapons(); track weapon.id) {
            <div class="weapon-slot" routerLink="/loadout/weapons" [queryParams]="{from: 'build'}">
              <div class="weapon-icon">
                <img [src]="getWeaponIconUrl(weapon.name)" [alt]="weapon.name" 
                     style="width: 100%; height: 100%; object-fit: contain; padding: 4px;"
                     (error)="$event.target.style.display = 'none'">
                <!-- Fallback icon -->
                <span class="material-symbols-outlined" style="position: absolute; opacity: 0.15;">swords</span>
              </div>
              <div class="weapon-info">
                <div class="weapon-name">{{ weapon.name | uppercase }}</div>
              </div>
            </div>
          }
        </div>
      </div>

      <!-- 2. Game Mode Selection -->
      <div class="config-section">
        <div class="section-header operation">
          <span class="material-symbols-outlined" data-icon="stadia_controller">stadia_controller</span>
          <h3>Operation Type</h3>
        </div>
        <div class="mode-grid">
          <button class="mode-btn">
            <div class="mode-name">SURVIVAL</div>
            <div class="mode-desc">Endless Wave</div>
          </button>
          <button class="mode-btn active">
            <div class="mode-name">TIME_ATTACK</div>
            <div class="mode-desc">Extraction Priority</div>
          </button>
          <button class="mode-btn danger">
            <div class="mode-name">HARDCORE</div>
            <div class="mode-desc">Single Life</div>
          </button>
        </div>
      </div>

      <!-- 3. Character Stats Overview -->
      <div class="config-section stats-overview">
        <div class="section-header stats">
          <span class="material-symbols-outlined" data-icon="monitoring">monitoring</span>
          <h3>Bio-Metrics Overview</h3>
        </div>
        <div class="stats-list">
          <div class="stat-row">
            <div class="stat-header">
              <span class="stat-name">AGILITY_RATING</span>
              <span class="stat-value">88%</span>
            </div>
            <div class="stat-bar-container">
              <div class="stat-bar"><div class="fill"></div><div class="fill"></div><div class="fill"></div><div class="fill"></div><div class="fill"></div><div class="fill"></div><div class="fill"></div><div class="empty"></div></div>
            </div>
          </div>
          <div class="stat-row">
            <div class="stat-header">
              <span class="stat-name">KINETIC_RESISTANCE</span>
              <span class="stat-value">64%</span>
            </div>
            <div class="stat-bar-container">
              <div class="stat-bar"><div class="fill"></div><div class="fill"></div><div class="fill"></div><div class="fill"></div><div class="fill"></div><div class="empty"></div><div class="empty"></div><div class="empty"></div></div>
            </div>
          </div>
          <div class="stat-row">
            <div class="stat-header">
              <span class="stat-name">NEURAL_SYNC_LATENCY</span>
              <span class="stat-value warning">12MS</span>
            </div>
            <div class="stat-bar-container warning">
              <div class="stat-bar"><div class="fill"></div><div class="fill"></div><div class="empty"></div><div class="empty"></div><div class="empty"></div><div class="empty"></div><div class="empty"></div><div class="empty"></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer: Confirm Button -->
    <div class="confirm-footer">
      <button class="btn-confirm" routerLink="/game">
        <span class="btn-text">CONFIRM_BUILD &amp; PLAY <span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span></span>
      </button>
    </div>
  </section>
</main>

<!-- UI Noise Overlay -->
<div class="noise-overlay">
  <svg viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <filter id="noiseFilter">
      <feturbulence basefrequency="0.65" numoctaves="3" stitchtiles="stitch" type="fractalNoise"></feturbulence>
    </filter>
    <rect filter="url(#noiseFilter)" height="100%" width="100%"></rect>
  </svg>
</div>
